<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Tripps to Anywhere</title>
<meta name="description" content="Real photos and videos from Tripps to Anywhere trips around Cape Town — Table Mountain, Chapman's Peak, safaris, sharks and more.">
<link rel="canonical" href="https://www.trippstoanywhere.com/gallery.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Tripps to Anywhere">
<meta property="og:title" content="The Gallery — Tripps to Anywhere">
<meta property="og:description" content="Real photos and videos from our Cape Town trips — mountains, oceans, lions, sharks and a lot of happy faces.">
<meta property="og:url" content="https://www.trippstoanywhere.com/gallery.html">
<meta property="og:image" content="https://www.trippstoanywhere.com/media/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Travellers above Hout Bay on Chapman's Peak Drive, Cape Town">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="The Gallery — Tripps to Anywhere">
<meta name="twitter:description" content="Real photos and videos from our Cape Town trips.">
<meta name="twitter:image" content="https://www.trippstoanywhere.com/media/og-image.jpg">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1f23; --deep:#12414b; --teal:#1c5d68; --seafoam:#a7ccc4;
    --sand:#e7d8c0; --paper:#f7f3ea; --rock:#6e6259; --line:rgba(13,31,35,.12);
    --serif:'Marcellus',serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased}
  img,video{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  h1{font-family:var(--serif);font-weight:400}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  nav{position:sticky;top:0;z-index:50;background:rgba(247,243,234,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 0}
  nav .wrap{display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--serif);font-size:20px}
  .back{font-size:14px;font-weight:500;color:var(--teal)}
  .back:hover{opacity:.7}

  header.page{padding:72px 0 36px}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);font-weight:600}
  header.page h1{font-size:clamp(34px,5vw,56px);margin-top:12px}
  header.page p{color:var(--rock);max-width:520px;margin-top:12px}

  .chips{display:flex;gap:10px;flex-wrap:wrap;padding:12px 0 32px}
  .chip{padding:9px 20px;border-radius:999px;border:1px solid var(--line);background:transparent;font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;transition:.2s}
  .chip:hover{border-color:var(--teal)}
  .chip.on{background:var(--deep);color:var(--paper);border-color:var(--deep)}

  .masonry{columns:4 260px;column-gap:16px;padding-bottom:96px}
  .tile{break-inside:avoid;margin-bottom:16px;position:relative;border-radius:14px;overflow:hidden;cursor:zoom-in;background:var(--sand)}
  .tile img,.tile video{width:100%;transition:transform .5s}
  .tile:hover img,.tile:hover video{transform:scale(1.03)}
  .tile figcaption{position:absolute;left:0;right:0;bottom:0;padding:40px 14px 12px;font-size:13px;color:var(--paper);background:linear-gradient(180deg,transparent,rgba(13,31,35,.78));opacity:0;transition:.3s}
  .tile:hover figcaption{opacity:1}
  .tile.is-video::after{content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;background:rgba(13,31,35,.65);color:var(--paper);display:flex;align-items:center;justify-content:center;font-size:20px;padding-left:5px;box-sizing:border-box;backdrop-filter:blur(4px);pointer-events:none}
  .tile.hide{display:none}

  .lightbox{position:fixed;inset:0;z-index:100;background:rgba(13,31,35,.94);display:none;align-items:center;justify-content:center;flex-direction:column;padding:32px}
  .lightbox.open{display:flex}
  .lightbox img,.lightbox video{max-width:min(92vw,1100px);max-height:78vh;border-radius:10px;object-fit:contain}
  .lb-cap{color:var(--seafoam);margin-top:16px;font-size:14px}
  .lb-btn{position:absolute;background:rgba(247,243,234,.1);border:1px solid rgba(247,243,234,.25);color:var(--paper);width:46px;height:46px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
  .lb-btn:hover{background:rgba(247,243,234,.22)}
  .lb-close{top:22px;right:22px}
  .lb-prev{left:22px;top:50%;transform:translateY(-50%)}
  .lb-next{right:22px;top:50%;transform:translateY(-50%)}
  @media(max-width:640px){.lb-prev{left:8px}.lb-next{right:8px}}

  footer{border-top:1px solid var(--line);padding:30px 0;font-size:14px;color:var(--rock)}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
  footer a:hover{color:var(--ink)}
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <a class="logo" href="index.html">Tripps to Anywhere</a>
    <a class="back" href="index.html">← Back to the trip</a>
  </div>
</nav>

<header class="page">
  <div class="wrap">
    <span class="eyebrow">Real trips · real guests</span>
    <h1>The Gallery</h1>
    <p>Every photo here was taken on one of our trips — mountains, oceans, lions, sharks and a lot of happy faces.</p>
  </div>
</header>

<div class="wrap">
  <div class="chips" id="chips">
    <button class="chip on" data-f="all">All</button>
    <button class="chip" data-f="places">Places</button>
    <button class="chip" data-f="people">People</button>
    <button class="chip" data-f="ocean">Ocean</button>
    <button class="chip" data-f="video">Videos</button>
  </div>
  <div class="masonry" id="grid"></div>
</div>

<div class="lightbox" id="lb">
  <button class="lb-btn lb-close" aria-label="Close">✕</button>
  <button class="lb-btn lb-prev" aria-label="Previous">←</button>
  <button class="lb-btn lb-next" aria-label="Next">→</button>
  <div id="lbMedia"></div>
  <div class="lb-cap" id="lbCap"></div>
</div>

<footer>
  <div class="wrap">
    <span>Tripps to Anywhere — Cape Town</span>
    <a href="https://www.facebook.com/share/17fV18rHh4/" target="_blank" rel="noopener">Facebook</a>
  </div>
</footer>

<script src="media.js"></script>
<script>
  const grid = document.getElementById('grid');
  MEDIA.forEach((m, i) => {
    const fig = document.createElement('figure');
    fig.className = 'tile' + (m.type === 'video' ? ' is-video' : '');
    fig.dataset.cat = m.category;
    fig.dataset.idx = i;
    fig.innerHTML = m.type === 'video'
      ? `<video src="media/${m.file}" muted playsinline preload="metadata"></video><figcaption>${m.caption}</figcaption>`
      : `<img src="media/${m.file}" alt="${m.caption}" loading="lazy"><figcaption>${m.caption}</figcaption>`;
    grid.appendChild(fig);
  });

  // filters
  document.getElementById('chips').addEventListener('click', e => {
    const btn = e.target.closest('.chip'); if (!btn) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c === btn));
    const f = btn.dataset.f;
    document.querySelectorAll('.tile').forEach(t =>
      t.classList.toggle('hide', f !== 'all' && t.dataset.cat !== f));
  });

  // lightbox
  const lb = document.getElementById('lb'), lbMedia = document.getElementById('lbMedia'), lbCap = document.getElementById('lbCap');
  let cur = 0;
  function visible(){ return [...document.querySelectorAll('.tile:not(.hide)')].map(t => +t.dataset.idx); }
  function show(idx){
    cur = idx;
    const m = MEDIA[idx];
    lbMedia.innerHTML = m.type === 'video'
      ? `<video src="media/${m.file}" controls autoplay playsinline></video>`
      : `<img src="media/${m.file}" alt="${m.caption}">`;
    lbCap.textContent = m.caption;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function step(d){
    const v = visible();
    const pos = v.indexOf(cur);
    show(v[(pos + d + v.length) % v.length]);
  }
  function close(){
    lb.classList.remove('open');
    lbMedia.innerHTML = '';
    document.body.style.overflow = '';
  }
  grid.addEventListener('click', e => {
    const t = e.target.closest('.tile'); if (t) show(+t.dataset.idx);
  });
  document.querySelector('.lb-close').onclick = close;
  document.querySelector('.lb-prev').onclick = () => step(-1);
  document.querySelector('.lb-next').onclick = () => step(1);
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') step(-1);
    if (e.key === 'ArrowRight') step(1);
  });
</script>
</body>
</html>
